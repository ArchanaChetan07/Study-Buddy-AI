services:
  study-buddy:
    build: .
    ports:
      - "8501:8501"
      - "${METRICS_HOST_PORT:-9090}:9090"
    environment:
      DEMO_MODE: "1"
      METRICS_PORT: "9090"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8501/_stcore/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s
