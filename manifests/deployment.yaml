apiVersion: apps/v1
kind: Deployment
metadata:
  name: study-buddy-ai
  labels:
    app: study-buddy-ai
    version: v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: study-buddy-ai
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: study-buddy-ai
        version: v2
    spec:
      containers:
        - name: study-buddy-ai
          image: dataguru97/studybuddy:latest
          ports:
            - containerPort: 8501

          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: groq-api-secret
                  key: GROQ_API_KEY

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 5
