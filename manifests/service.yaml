apiVersion: v1
kind: Service
metadata:
  name: study-buddy-ai-service
  labels:
    app: study-buddy-ai
spec:
  selector:
    app: study-buddy-ai
  ports:
    - name: http
      port: 80
      targetPort: 8501
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  type: NodePort
