name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    env:
      DEMO_MODE: "1"
      GROQ_API_KEY: ""
      PYTHONPATH: "."
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-cov ruff

      - name: Lint (ruff strict)
        run: ruff check . --select E,W,F --ignore E501

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Quiz-quality eval (DEMO_MODE)
        run: python scripts/eval_quiz_quality.py

      - name: Upload eval artifact
        uses: actions/upload-artifact@v4
        with:
          name: quiz-quality-metrics
          path: artifacts/quiz_quality_metrics.json
